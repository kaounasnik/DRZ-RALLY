<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR-Z400 Rally Build</title>
    <style>
        /* Base tactical aesthetic */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        /* The responsive engine */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 20px;
        }

        /* Image constraints */
        .gallery-grid img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .gallery-grid img:hover {
            transform: scale(1.02);
            border-color: #666;
        }
    </style>
</head>
<body>

    <h1>Project: Unicorn / DR-Z400</h1>

    <div class="gallery-grid">
        <img src="dream.jpg" alt="Test Photo 1" loading="lazy">
        <img src="ΒΕΝΖΙΝΗ.png" alt="Test Photo 2" loading="lazy">
        <img src="heated_seat_sign.png" alt="Test Photo 3" loading="lazy">
    </div>

</body>
</html>
